site_name: Aegis
site_description: The shield your commits pass through. A single-binary, shift-left security orchestrator for Git hooks and CI.
site_url: https://aegis-sec.github.io/aegis/
repo_name: aegis-sec/aegis
repo_url: https://github.com/aegis-sec/aegis
edit_uri: edit/main/docs/docs/
copyright: "© 2026 The Aegis Authors. Released under the MIT License."

docs_dir: docs

theme:
  name: material
  language: en
  icon:
    logo: material/shield-check
    repo: fontawesome/brands/github
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aegis-sec/aegis
  generator: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - tags

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started.md
      - Installation: installation.md
      - Your first scan: first-scan.md
  - Configuration:
      - The aegis.yaml file: configuration.md
      - Stacks and detection: stacks.md
      - Severities and gates: severities.md
      - Baseline and allowlist: baseline-allowlist.md
  - How it works:
      - The pipeline: pipeline.md
      - Architecture: architecture.md
      - Supply-chain model: supply-chain.md
      - Concurrency and performance: performance.md
  - CLI reference:
      - Overview: commands/index.md
      - init: commands/init.md
      - install / uninstall: commands/install.md
      - run: commands/run.md
      - doctor: commands/doctor.md
      - baseline: commands/baseline.md
      - ignore: commands/ignore.md
      - explain: commands/explain.md
      - version: commands/version.md
  - Scanners:
      - Overview: scanners/index.md
      - gitleaks: scanners/gitleaks.md
      - opengrep: scanners/opengrep.md
      - osv-scanner: scanners/osv-scanner.md
      - biome: scanners/biome.md
      - ruff: scanners/ruff.md
      - golangci-lint: scanners/golangci-lint.md
      - gofmt: scanners/gofmt.md
      - shellcheck: scanners/shellcheck.md
  - CI integration: ci-integration.md
  - Operations:
      - Override and audit log: operations-override.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - Full specification: reference/spec.md
      - Exit codes: reference/exit-codes.md
      - Environment variables: reference/env-vars.md
      - Glossary: reference/glossary.md
  - Contributing:
      - Contributor guide: contributing.md
      - Adding a scanner: adding-a-scanner.md
      - Release process: release-process.md
