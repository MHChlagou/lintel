# Embedded scanner pin database.
#
# Every entry declares, for one scanner at one version on one platform:
#   - the upstream release asset URL (must be HTTPS + host-allowlisted)
#   - archive_sha256: hash of the asset as downloaded (verified by
#                     `lintel install` before extraction)
#   - binary_sha256:  hash of the extracted executable on disk (verified
#                     by the resolver every time the scanner is invoked)
#   - how to extract the binary (archive type + binary name)
#
# For archive: raw scanners, archive_sha256 == binary_sha256. For tar.gz,
# tar.xz, zip they differ, and both must be pinned for end-to-end
# verification. Placeholder (all-zero) hashes cause the installer and the
# resolver to refuse; populate them via `go run ./scripts/refresh-pins.go`.
#
# Platform keys use Go's runtime.GOOS + "_" + runtime.GOARCH.

