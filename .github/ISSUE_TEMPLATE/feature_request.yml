name: Feature request
description: Propose a new feature, adapter, or change to Lintel.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Before filing, please check the
        [roadmap](../../docs/docs/reference/spec.md#21-roadmap) - your idea may
        already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change to Lintel would solve the problem? CLI surface, config shape, or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you rejected them.

  - type: dropdown
    id: area
    attributes:
      label: Area of Lintel
      options:
        - CLI command / UX
        - Config schema
        - New scanner adapter
        - Output format (JSON / SARIF / JUnit / other)
        - Supply-chain verification
        - Hooks / Git integration
        - CI / release
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
        - label: I am willing to help test a PR that implements this.
