name: Release

# Builds, signs, and publishes release artifacts on a tag push.
# All third-party actions are SHA-pinned to audited versions.
# VERSION is taken from github.ref_name via env: so it is safe to interpolate.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Build release artifacts
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION}"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          build_one() {
            local os="$1"; local arch="$2"; local ext=""
            if [ "${os}" = "windows" ]; then ext=".exe"; fi
            local out="dist/aegis-${os}-${arch}${ext}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath \
              -ldflags "-s -w \
                -X github.com/aegis-sec/aegis/internal/version.Version=${version} \
                -X github.com/aegis-sec/aegis/internal/version.Commit=${commit} \
                -X github.com/aegis-sec/aegis/internal/version.Date=${date}" \
              -o "${out}" ./cmd/aegis
            sha256sum "${out}" | awk '{print $1}' > "${out}.sha256"
          }
          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64
          build_one windows amd64

      - name: Sign binaries with cosign (keyless)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for f in dist/aegis-*; do
            case "${f}" in
              *.sha256|*.sig|*.pem) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*
          generate_release_notes: true
