name: Release

# Builds, signs, and publishes release artifacts on a tag push.
# All third-party actions are SHA-pinned to audited versions.
# VERSION is taken from github.ref_name via env: so it is safe to interpolate.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Build release artifacts
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION}"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          build_one() {
            local os="$1"; local arch="$2"; local ext=""
            if [ "${os}" = "windows" ]; then ext=".exe"; fi
            local out="dist/aegis-${os}-${arch}${ext}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath \
              -ldflags "-s -w \
                -X github.com/MHChlagou/aegis/internal/version.Version=${version} \
                -X github.com/MHChlagou/aegis/internal/version.Commit=${commit} \
                -X github.com/MHChlagou/aegis/internal/version.Date=${date}" \
              -o "${out}" ./cmd/aegis
            sha256sum "${out}" | awk '{print $1}' > "${out}.sha256"
          }
          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64
          build_one windows amd64

      - name: Extract changelog section for this tag
        id: changelog
        shell: bash
        env:
          # github.ref_name is the pushed tag name (e.g. v0.2.0). Consumed
          # only via this env var — never interpolated directly into the
          # shell — to avoid workflow-injection surface.
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # CHANGELOG.md headings are "## [0.2.0] - YYYY-MM-DD"; strip the
          # leading "v" from the tag to match.
          version="${VERSION#v}"
          notes_file="$(mktemp)"

          awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
            in_section && /^## \[/   { exit }
            in_section               { print }
          ' CHANGELOG.md > "${notes_file}"

          if [ ! -s "${notes_file}" ]; then
            echo "no CHANGELOG.md section found for ${version}" >&2
            printf "See [CHANGELOG.md](https://github.com/%s/blob/%s/CHANGELOG.md) for details.\n" \
              "${REPO}" "${VERSION}" > "${notes_file}"
          fi
          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Sign binaries with cosign (keyless)
        shell: bash
        run: |
          set -euo pipefail
          # cosign v4 emits a single .sigstore bundle per artifact that carries
          # both the signature and the signing certificate. The old separate
          # .sig / .pem outputs are deprecated and ignored when --bundle is set.
          for f in dist/aegis-*; do
            case "${f}" in
              *.sha256|*.sigstore) continue ;;
            esac
            cosign sign-blob --yes \
              --bundle "${f}.sigstore" \
              "${f}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*
          body_path: ${{ steps.changelog.outputs.path }}
          append_body: true
          generate_release_notes: true
