name: CI

# No user-controlled event fields are interpolated into run: steps.
# All third-party actions are SHA-pinned to audited versions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        shell: bash
        run: go mod download

      - name: Verify module integrity
        shell: bash
        run: go mod verify

      - name: Vet
        shell: bash
        run: go vet ./...

      - name: Test (race + coverage)
        shell: bash
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@8564da7cb3c6866ed1da648ca8f00a258ef0c802 # v6.5.2
        with:
          version: v1.61.0
          args: --timeout=5m

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="$(git describe --tags --always 2>/dev/null || echo dev)"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w \
            -X github.com/aegis-sec/aegis/internal/version.Version=${version} \
            -X github.com/aegis-sec/aegis/internal/version.Commit=${commit} \
            -X github.com/aegis-sec/aegis/internal/version.Date=${date}"
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          out="dist/aegis-${GOOS}-${GOARCH}${ext}"
          mkdir -p dist
          go build -trimpath -ldflags "${ldflags}" -o "${out}" ./cmd/aegis
          sha256sum "${out}" | tee "${out}.sha256"

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aegis-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/aegis-${{ matrix.goos }}-${{ matrix.goarch }}*

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run govulncheck
        # Pinned to v1.1.4 — the last release that supports Go 1.22.
        # Upgrade when we move go.mod past Go 1.22.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  self-smoke:
    name: Self-smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aegis-linux-amd64
          path: dist
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          chmod +x dist/aegis-linux-amd64
          ./dist/aegis-linux-amd64 version
          tmp=$(mktemp -d)
          (cd "${tmp}" && git init -q)
          ./dist/aegis-linux-amd64 --repo "${tmp}" init
          test -f "${tmp}/.aegis/aegis.yaml"
          sed -i -e '/^  secrets:/,/^  [a-z]/ s/    enabled: true/    enabled: false/' \
                 -e '/^  malicious_code:/,/^  [a-z]/ s/    enabled: true/    enabled: false/' \
                 -e '/^  dependencies:/,/^  [a-z]/ s/    enabled: true/    enabled: false/' \
                 "${tmp}/.aegis/aegis.yaml"
          ./dist/aegis-linux-amd64 --repo "${tmp}" run --output json | tee /tmp/out.json
          python3 -m json.tool < /tmp/out.json >/dev/null
