name: PR Checks

# This workflow only reads PR metadata and applies labels; it never evaluates
# user-controlled strings inside run: steps. Third-party actions are SHA-pinned.

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The subject after the colon should start with lowercase and must
            not end with a period. Example - feat(runner): parallelize scanners

  size-label:
    name: Size label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Apply size label
        uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: size/xs
          xs_max_size: "20"
          s_label: size/s
          s_max_size: "100"
          m_label: size/m
          m_max_size: "500"
          l_label: size/l
          l_max_size: "1000"
          xl_label: size/xl
          fail_if_xl: "false"
          message_if_xl: |
            This PR changes more than 1000 lines. Consider splitting it into
            smaller focused PRs for easier review.
