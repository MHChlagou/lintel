# golangci-lint v2 configuration.
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

issues:
  # Show every issue rather than capping per-linter / per-path. Without these,
  # errcheck (and others) silently stop at ~3 issues per file and ~50 total,
  # which can hide the true count after a refactor.
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck       # includes former "gosimple" rules in v2
    - unused
    - misspell
    - unconvert
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/MHChlagou/lintel
