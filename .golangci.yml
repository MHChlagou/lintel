run:
  timeout: 5m
  # This is the Go version the linter analyzes against, not the runtime version.
  # Must be <= the Go version golangci-lint itself was built with (v1.61.0 = 1.23).
  # Bumping the actual Go toolchain (ci.yml, go.mod) is independent of this.
  go: "1.23"
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  goimports:
    local-prefixes: github.com/MHChlagou/aegis

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
